[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Full suite includes Playwright E2E (requires Next.js + FastAPI running). For unit/API/recon only:
#   pytest -m "not e2e"
addopts = -v --tb=short
markers =
    e2e: marks tests as end-to-end Playwright tests (deselect with '-m "not e2e"')
    reconciliation: marks tests as financial reconciliation checks
    integration: marks tests as API integration tests
    data_integrity: marks processed JSON vs Excel CSV cross-checks
